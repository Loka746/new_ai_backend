<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ShopNova</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo"><a href="/">ShopNova</a></div>
    </nav>
    <main class="container auth-container">
        <div class="auth-box">
            <h2 id="auth-title">Login</h2>
            <form id="auth-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Submit</button>
            </form>
            <p class="toggle-auth">
                <span id="toggle-text">Don't have an account?</span>
                <button id="toggle-btn" class="btn-link">Register</button>
            </p>
            <div id="auth-error" class="error-msg"></div>
        </div>
    </main>
    <script src="/static/js/app.js"></script>
    <script>
        let isLogin = true;
        document.getElementById('toggle-btn').addEventListener('click', () => {
            isLogin = !isLogin;
            document.getElementById('auth-title').innerText = isLogin ? 'Login' : 'Register';
            document.getElementById('toggle-text').innerText = isLogin ? "Don't have an account?" : "Already have an account?";
            document.getElementById('toggle-btn').innerText = isLogin ? 'Register' : 'Login';
            document.getElementById('auth-error').innerText = '';
        });

        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('auth-error');
            
            try {
                if (isLogin) {
                    await login(email, password);
                } else {
                    await register(email, password);
                    await login(email, password);
                }
                window.location.href = '/dashboard';
            } catch (err) {
                errorDiv.innerText = err.message;
            }
        });
    </script>
</body>
</html>

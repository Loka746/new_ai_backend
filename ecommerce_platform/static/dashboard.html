<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - ShopNova</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo"><a href="/">ShopNova</a></div>
        <div class="nav-links">
            <a href="/">Home</a>
            <button onclick="logout()" class="btn btn-danger">Logout</button>
        </div>
    </nav>
    <main class="container">
        <h1>Dashboard</h1>
        <div id="user-info" class="card mb-2"></div>
        
        <div id="admin-panel" style="display: none;" class="card mb-2">
            <h2>Admin Panel - Add Product</h2>
            <form id="add-product-form" class="form-grid">
                <input type="text" id="p-name" placeholder="Product Name" required>
                <input type="text" id="p-desc" placeholder="Description" required>
                <input type="number" id="p-price" placeholder="Price" step="0.01" required>
                <input type="text" id="p-image" placeholder="Image URL" required>
                <input type="number" id="p-stock" placeholder="Stock" required>
                <button type="submit" class="btn btn-primary">Add Product</button>
            </form>
        </div>

        <div class="card">
            <h2>Your Orders</h2>
            <div id="orders-list"></div>
        </div>
    </main>
    <script src="/static/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/login';
                return;
            }
            
            try {
                const user = await fetchWithAuth('/api/users/me');
                document.getElementById('user-info').innerHTML = `<p>Logged in as: <strong>${user.email}</strong> ${user.is_admin ? '<span style="color: var(--primary); font-weight: bold;">(Admin)</span>' : ''}</p>`;
                
                if (user.is_admin) {
                    document.getElementById('admin-panel').style.display = 'block';
                    document.getElementById('add-product-form').addEventListener('submit', async (e) => {
                        e.preventDefault();
                        const product = {
                            name: document.getElementById('p-name').value,
                            description: document.getElementById('p-desc').value,
                            price: parseFloat(document.getElementById('p-price').value),
                            image_url: document.getElementById('p-image').value,
                            stock: parseInt(document.getElementById('p-stock').value)
                        };
                        try {
                            await fetchWithAuth('/api/products', {
                                method: 'POST',
                                body: JSON.stringify(product)
                            });
                            alert('Product added successfully!');
                            e.target.reset();
                        } catch (err) {
                            alert(err.message);
                        }
                    });
                }

                const orders = await fetchWithAuth('/api/orders');
                const ordersHtml = orders.length ? orders.map(o => `
                    <div class="order-item">
                        <p><strong>Order #${o.id}</strong> - Product ID: ${o.product_id} - Qty: ${o.quantity} - Total: $${o.total_price.toFixed(2)}</p>
                        <p style="font-size: 0.8rem; color: #6b7280;">Placed on: ${new Date(o.created_at).toLocaleString()}</p>
                    </div>
                `).join('') : '<p>No orders found.</p>';
                document.getElementById('orders-list').innerHTML = ordersHtml;

            } catch (err) {
                console.error(err);
                logout();
            }
        });
    </script>
</body>
</html>

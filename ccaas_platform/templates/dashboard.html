<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Workspace - CCaaS</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="dashboard-body">
    <nav class="sidebar">
        <div class="sidebar-header">
            <h2>Worktual</h2>
            <span class="badge">Agent</span>
        </div>
        <div class="agent-profile">
            <div class="avatar"></div>
            <div class="info">
                <h3 id="agentName">Loading...</h3>
                <select id="statusSelect" class="status-dropdown">
                    <option value="offline">Offline</option>
                    <option value="available">Available</option>
                    <option value="busy">Busy</option>
                </select>
            </div>
        </div>
        <ul class="nav-links">
            <li class="active"><a href="#">Workspace</a></li>
            <li><a href="#">History</a></li>
            <li><a href="#">Settings</a></li>
        </ul>
        <button id="logoutBtn" class="btn btn-danger logout-btn">Logout</button>
    </nav>

    <main class="main-content">
        <header class="topbar">
            <h1>Active Workspace</h1>
            <div class="system-status">
                <span id="wsStatus" class="status-indicator offline"></span>
                System Disconnected
            </div>
        </header>

        <div class="dashboard-grid">
            <section class="card active-interaction">
                <h2>Current Interaction</h2>
                <div id="currentInteractionContent" class="empty-state">
                    <p>No active interactions. Change status to 'Available' to receive routing.</p>
                </div>
            </section>

            <section class="card queue-stats">
                <h2>Queue Statistics</h2>
                <div class="stats-grid">
                    <div class="stat-box">
                        <h4>Calls Waiting</h4>
                        <span class="stat-value">0</span>
                    </div>
                    <div class="stat-box">
                        <h4>Chats Waiting</h4>
                        <span class="stat-value">0</span>
                    </div>
                    <div class="stat-box">
                        <h4>Avg Wait Time</h4>
                        <span class="stat-value">00:00</span>
                    </div>
                </div>
            </section>
        </div>
    </main>
    <script src="/static/js/app.js"></script>
    <script>
        // Initialize dashboard logic
        document.addEventListener('DOMContentLoaded', () => {
            initDashboard();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Dashboard</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-chart-line"></i> CRM Pro</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-target="dashboard-view">
                    <i class="fas fa-home"></i> Dashboard
                </a>
                <a href="#" class="nav-item" data-target="customers-view">
                    <i class="fas fa-users"></i> Customers
                </a>
                <a href="#" class="nav-item" data-target="leads-view">
                    <i class="fas fa-bullseye"></i> Leads
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search...">
                </div>
                <div class="user-menu">
                    <span id="user-name">Loading...</span>
                    <button id="logout-btn" class="btn btn-outline-danger btn-sm">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </header>

            <div class="content-area">
                <!-- Dashboard View -->
                <div id="dashboard-view" class="view-section active">
                    <h2 class="page-title">Dashboard Overview</h2>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-icon bg-primary"><i class="fas fa-users"></i></div>
                            <div class="stat-details">
                                <h3>Total Customers</h3>
                                <p id="stat-customers">0</p>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon bg-success"><i class="fas fa-bullseye"></i></div>
                            <div class="stat-details">
                                <h3>Active Leads</h3>
                                <p id="stat-leads">0</p>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon bg-warning"><i class="fas fa-dollar-sign"></i></div>
                            <div class="stat-details">
                                <h3>Pipeline Value</h3>
                                <p id="stat-value">$0</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Customers View -->
                <div id="customers-view" class="view-section hidden">
                    <div class="page-header">
                        <h2 class="page-title">Customers</h2>
                        <button class="btn btn-primary" onclick="showModal('customer-modal')">
                            <i class="fas fa-plus"></i> Add Customer
                        </button>
                    </div>
                    <div class="card">
                        <div class="table-responsive">
                            <table class="data-table" id="customers-table">
                                <thead>
                                    <tr>
                                        <th>Company</th>
                                        <th>Contact</th>
                                        <th>Email</th>
                                        <th>Industry</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <!-- Populated by JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Leads View -->
                <div id="leads-view" class="view-section hidden">
                    <div class="page-header">
                        <h2 class="page-title">Leads Pipeline</h2>
                        <button class="btn btn-primary" onclick="showModal('lead-modal')">
                            <i class="fas fa-plus"></i> Add Lead
                        </button>
                    </div>
                    <div class="card">
                        <div class="table-responsive">
                            <table class="data-table" id="leads-table">
                                <thead>
                                    <tr>
                                        <th>Title</th>
                                        <th>Contact</th>
                                        <th>Status</th>
                                        <th>Value</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <!-- Populated by JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Customer Modal -->
    <div id="customer-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="customer-modal-title">Add Customer</h3>
                <button class="close-btn" onclick="hideModal('customer-modal')">&times;</button>
            </div>
            <form id="customer-form">
                <input type="hidden" id="customer-id">
                <div class="form-group">
                    <label>Company Name</label>
                    <input type="text" id="cust-company" required>
                </div>
                <div class="form-group">
                    <label>Contact Name</label>
                    <input type="text" id="cust-contact" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="cust-email" required>
                </div>
                <div class="form-group">
                    <label>Industry</label>
                    <input type="text" id="cust-industry">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="hideModal('customer-modal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Customer</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Lead Modal -->
    <div id="lead-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="lead-modal-title">Add Lead</h3>
                <button class="close-btn" onclick="hideModal('lead-modal')">&times;</button>
            </div>
            <form id="lead-form">
                <input type="hidden" id="lead-id">
                <div class="form-group">
                    <label>Lead Title</label>
                    <input type="text" id="lead-title" required>
                </div>
                <div class="form-group">
                    <label>Contact Name</label>
                    <input type="text" id="lead-contact" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="lead-email" required>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="lead-status">
                        <option value="new">New</option>
                        <option value="contacted">Contacted</option>
                        <option value="qualified">Qualified</option>
                        <option value="lost">Lost</option>
                        <option value="converted">Converted</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Estimated Value ($)</label>
                    <input type="number" id="lead-value" step="0.01">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="hideModal('lead-modal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Lead</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="/static/js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Login</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card">
            <h2>Welcome to CRM</h2>
            <p class="auth-subtitle">Sign in to continue</p>
            
            <div id="auth-error" class="alert alert-danger hidden"></div>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Enter your password">
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="login-btn">
                    <span class="btn-text">Sign In</span>
                    <span class="spinner hidden"></span>
                </button>
            </form>
            
            <div class="auth-switch">
                <p>Don't have an account? <a href="#" id="show-register">Register here</a></p>
            </div>
        </div>

        <div class="auth-card hidden" id="register-card">
            <h2>Create Account</h2>
            <p class="auth-subtitle">Join the CRM platform</p>
            
            <div id="reg-error" class="alert alert-danger hidden"></div>
            
            <form id="register-form">
                <div class="form-group">
                    <label for="reg-name">Full Name</label>
                    <input type="text" id="reg-name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label for="reg-email">Email Address</label>
                    <input type="email" id="reg-email" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" required minlength="8" placeholder="Min 8 characters">
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="reg-btn">
                    <span class="btn-text">Register</span>
                    <span class="spinner hidden"></span>
                </button>
            </form>
            
            <div class="auth-switch">
                <p>Already have an account? <a href="#" id="show-login">Sign in here</a></p>
            </div>
        </div>
    </div>
    <script src="/static/js/auth.js"></script>
</body>
</html>
